<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>BIT-ADSO</title>
</head>
<body>

    <header>Control de evidencias</header>

    <main>

        <!------sección creación de evidencias------>
        <section id="seccion-formulario">
            <h2>Nueva evidencia</h2>
            <input type="text" id="input-nombre" placeholder="Nombre de la evidencia">
            <input type="url" id="input-url" placeholder="URL entrega">
            <input type="datetime-local" id="input-fecha">
            <input type="url" id="input-url-clase" placeholder="URL clase">
            <input type="url" id="input-url-material" placeholder="URL material">
            <button id="btn-guardar">Guardar evidencia</button>
        </section>
      

         <!---------Tabla de evidencias------------>
        
         <section id="section-tabla">
            <h2>Mis evidencias</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>url</th>
                        <th>Fecha limite</th>
                        <th>Estatus</th>
                        <th>Material aprendizaje</th>
                        <th>clase</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <!------En esta sección se injecta las filas-->
                </tbody>
            </table>
         </section>

    </main>

 <script src="js/app.js"></script>

</body>
</html>
